<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AntiClickBaitLinks</title>
    <style>
      body {
        margin: 0;
        min-width: 320px;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #ffffff 0%, #ecfdf5 100%);
        color: #18181b;
      }

      .wrap {
        padding: 16px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: #d1fae5;
        color: #047857;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        font-size: 20px;
        margin: 14px 0 10px;
      }

      p {
        font-size: 13px;
        line-height: 1.5;
        color: #52525b;
      }

      .url {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid #d4d4d8;
        font-size: 12px;
        color: #3f3f46;
        word-break: break-all;
      }

      button {
        width: 100%;
        margin-top: 14px;
        border: none;
        border-radius: 14px;
        padding: 12px 14px;
        background: #059669;
        color: #ffffff;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: #ffffff;
        color: #047857;
        border: 1px solid #a7f3d0;
      }

      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <span class="badge">AntiClickBait</span>
      <h1>Resume esta pagina</h1>
      <p id="status">Detectando la pestaña actual...</p>
      <div id="current-url" class="url"></div>
      <button id="open-app" disabled>Abrir en AntiClickBaitLinks</button>
      <button id="copy-link" class="secondary" disabled>Copiar enlace</button>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
